name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN="ccdash-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/takumanakagame/ccmanage/internal/buildinfo.Version=${GITHUB_REF_NAME}" \
            -o "dist/${BIN}" ./cmd/ccdash
          (cd dist && sha256sum "${BIN}" > "${BIN}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: ccdash-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tags with a hyphen suffix (vX.Y.Z-beta.1, vX.Y.Z-rc.2, ...)
          # are pre-releases. action-gh-release's auto-detection isn't
          # reliable for our suffix style, so we set it explicitly.
          prerelease: ${{ contains(github.ref_name, '-') }}
